<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulls Gym App - Actualización Premium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Poppins:wght@300;400;700&display=swap');

        :root {
            --red: #ff003c;
            --yellow: #ffcc00;
            --white: #ffffff;
            --black: #050505;
            --dark-gray: #121212;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--black);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Fondo Animado de Partículas */
        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 0, 60, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 204, 0, 0.1) 0%, transparent 40%);
            z-index: 1;
        }

        /* Contenedor Principal */
        .container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 650px;
            background: rgba(18, 18, 18, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 3.5rem 2rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 
                        inset 0 1px 0 rgba(255,255,255,0.1);
            animation: containerEntrance 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Encabezado / Logo Estilo Cyber-Gym */
        .logo-box {
            margin-bottom: 1.5rem;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .logo-text .bulls {
            color: var(--white);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .logo-text .gym {
            color: var(--red);
            text-shadow: 0 0 20px rgba(255, 0, 60, 0.6);
            position: relative;
        }

        .badge-app {
            display: inline-block;
            background: var(--yellow);
            color: var(--black);
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            padding: 4px 12px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 4px;
            transform: skewX(-12deg);
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
            margin-bottom: 2rem;
        }

        h2 {
            color: var(--white);
            font-size: 1.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        p {
            color: #a0a0a0;
            font-size: 1.05rem;
            line-height: 1.6;
            max-width: 500px;
            margin: 0 auto 3rem auto;
        }

        /* --- UI DE CARGA PREMIUM --- */
        .loader-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 2.5rem auto;
        }

        /* Círculo Exterior (Rojo) */
        .circle-outer {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid transparent;
            border-top-color: var(--red);
            border-bottom-color: var(--red);
            border-radius: 50%;
            animation: spinClockwise 2s linear infinite;
        }

        /* Círculo Interior (Amarillo) */
        .circle-inner {
            position: absolute;
            width: 80%;
            height: 80%;
            top: 10%;
            left: 10%;
            border: 4px solid transparent;
            border-left-color: var(--yellow);
            border-right-color: var(--yellow);
            border-radius: 50%;
            animation: spinCounterClockwise 1.3s linear infinite;
        }

        /* Icono de rayo central */
        .loader-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--white);
            font-size: 1.8rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            animation: pulseGlow 1.5s ease-in-out infinite;
        }

        /* Cronómetro Digital */
        .countdown-box {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 500;
            color: var(--white);
            letter-spacing: 3px;
            margin-bottom: 0.5rem;
            display: inline-flex;
            gap: 5px;
        }

        .countdown-label {
            color: #555;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
        }

        /* Barra de Progreso Lineal Estilizada */
        .bar-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--red), var(--yellow));
            box-shadow: 0 0 10px var(--red);
            transform-origin: left;
            animation: dynamicProgress 1200s linear forwards; /* 1200s = 20 Minutos */
        }

        /* --- ANIMACIONES --- */
        @keyframes containerEntrance {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes spinClockwise {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes spinCounterClockwise {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }

        @keyframes pulseGlow {
            0%, 100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.6; text-shadow: 0 0 5px var(--red); }
            50% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; text-shadow: 0 0 20px var(--red), 0 0 30px var(--yellow); }
        }

        @keyframes dynamicProgress {
            from { transform: scaleX(0); }
            to { transform: scaleX(1); }
        }

        /* Adaptabilidad Móvil */
        @media (max-width: 480px) {
            .logo-text { font-size: 2.3rem; }
            .container { padding: 2.5rem 1.5rem; }
            h2 { font-size: 1.3rem; }
            p { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <!-- Logo de la Marca -->
        <div class="logo-box">
            <h1 class="logo-text">
                <span class="bulls">Bulls</span> <span class="gym">Gym</span>
            </h1>
            <div class="badge-app">App</div>
        </div>

        <!-- Mensajes Principales -->
        <h2>Mantenimiento del Sistema</h2>
        <p>Espera 20 minutos, recarga la página para probar la nueva versión con mejoras y fallos corregidos.</p>
        
        <!-- Círculo de Carga Premium -->
        <div class="loader-wrapper">
            <div class="circle-outer"></div>
            <div class="circle-inner"></div>
            <div class="loader-center"><span>➔</span></div>
        </div>

        <!-- Cuenta Regresiva de 20 min -->
        <div class="countdown-box" id="timer">20:00</div>
        <div class="countdown-label">Tiempo estimado restante</div>

        <!-- Barra de Progreso Lineal -->
        <div class="bar-container">
            <div class="bar-fill"></div>
        </div>
    </div>

    <script>
        // Configuración del temporizador: 20 minutos (en segundos)
        let totalTime = 20 * 60; 
        const timerElement = document.getElementById('timer');

        function updateCountdown() {
            let minutes = Math.floor(totalTime / 60);
            let seconds = totalTime % 60;

            // Formato con ceros a la izquierda
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;

            timerElement.textContent = `${minutes}:${seconds}`;

            if (totalTime <= 0) {
                clearInterval(countdownInterval);
                // Forzar recarga automática de la página al terminar el tiempo
                window.location.reload(); 
            } else {
                totalTime--;
            }
        }

        // Ejecutar la cuenta regresiva inmediatamente y luego cada segundo
        updateCountdown();
        const countdownInterval = setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
